  <ellipse cx="200" cy="200" rx="65" ry="120" fill="none" stroke="white" stroke-width="6" opacity="0.4"/>
  <line x1="80" y1="200" x2="320" y2="200" stroke="white" stroke-width="6" opacity="0.4"/>
  <line x1="200" y1="80" x2="200" y2="320" stroke="white" stroke-width="6" opacity="0.4"/>

